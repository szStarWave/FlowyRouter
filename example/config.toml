# Flowy Router — 推荐示例配置
#
# 复制:
#   Linux/macOS: cp example/config.toml ~/.flowy-router/config.toml
#   Windows:     copy example\config.toml %USERPROFILE%\.flowy-router\config.toml
#
# 或直接指定:
#   flowy --config example/config.toml gateway start
#   make start CONFIG=example/config.toml

# ---------------------------------------------------------------------------
# Gateway
# ---------------------------------------------------------------------------
[gateway]
listen = "127.0.0.1:11080"

# 端/云/级联总开关（仅配置文件控制，请求头不能覆盖）
#   auto     — 按难度 + profile + routing_mode 自动选择
#   edge     — 全部端侧（不可用则降级 cloud）
#   cloud    — 全部云端
#   cascade  — 每请求先 edge，质量不过关再升 cloud
route = "auto"

# 仅 route = "auto" 时生效:
#   single   — 低难度 edge，否则 cloud
#   cascade  — 低 edge；中 先 edge 再可能升 cloud；高 cloud
#   split    — 当前实现等同全部 cloud
routing_mode = "cascade"

# 难度阈值策略: economy | balanced | premium | privacy
default_profile = "balanced"

# 端侧上下文 token 上限；超过约 80% 触发 GATE_CTX_OVERFLOW → 走云
ctx_edge_max_tokens = 65536

# 可选：入站鉴权（Authorization: Bearer 或 x-api-key）
# api_key = "flowy-local"

# 可选：保护 POST /v1/admin/shutdown（头 X-Flowy-Admin-Token）
# admin_token = "change-me"

# --- 经验学习（持久化 experience.json）---
# experience_enabled = true
# experience_learning_rate = 0.08      # 偏置更新强度
# experience_max_bias = 0.12           # 单 step_kind 偏置上限
# experience_target_fallback = 0.15    # 级联回退目标比例（自适应路由参考）
# cloud_sticky_ttl_secs = 600          # 升云后会话粘性（秒）
# session_persist_enabled = true

# --- Work 步态云端校验（ToolSelect 等）---
# work_verify_sample_rate = 0.1        # 0=不校验，1=每步校验；默认 0.1

# --- 运行时自适应（仅内存，不写回配置；见 flowy stats 自适应分区）---
# adaptive_routing_enabled = true
# adaptive_min_verified_samples = 20   # 预热：云验证样本不足时用上面基线
# adaptive_verify_rate_floor = 0.05
# adaptive_verify_rate_ceiling = 0.45
# adaptive_max_theta_shift = 0.05      # 健康时放宽 θ_edge，提高端侧占比

# ---------------------------------------------------------------------------
# 上游（OpenAI 兼容 Chat Completions）
# ---------------------------------------------------------------------------
[upstream.edge]
base_url = "http://127.0.0.1:11434/v1"
# model = "qwen3"          # 端侧上游模型；setup 默认不创建 edge 段
# api_key = "ollama"

[upstream.cloud]
base_url = "https://api.deepseek.com/v1"
model = "auto"               # auto = 保留客户端 model，由 Flowy 路由
# api_key = "sk-your-deepseek-api-key"

# ---------------------------------------------------------------------------
# CLI
# ---------------------------------------------------------------------------
[cli]
